<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IV Monitor | Live Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #38bdf8;
            --danger: #ef4444;
            --success: #22c55e;
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .status-online { background: rgba(34, 197, 94, 0.2); color: var(--success); border: 1px solid var(--success); }
        .status-offline { background: rgba(239, 68, 68, 0.2); color: var(--danger); border: 1px solid var(--danger); }

        .card {
            background: var(--card);
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* The Animated Liquid Background */
        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--primary);
            opacity: 0.1;
            transition: height 1s ease-in-out;
            z-index: 0;
        }

        .content { position: relative; z-index: 1; }

        h1 { font-family: 'Orbitron', sans-serif; font-size: 1rem; letter-spacing: 2px; margin-bottom: 30px; opacity: 0.7; }

        .percentage {
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            font-weight: 700;
            margin: 10px 0;
            color: var(--primary);
        }

        .volume-display {
            font-size: 1.5rem;
            font-weight: 300;
            margin-bottom: 10px;
        }

        .timestamp {
            font-size: 0.75rem;
            opacity: 0.5;
            margin-top: 20px;
        }

        /* Responsive Mobile Tweak */
        @media (max-width: 380px) {
            .percentage { font-size: 4rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="statusTag" class="status-badge status-offline">CONNECTING...</div>
    
    <div class="card">
        <div id="liquidWave" class="wave" style="height: 0%;"></div>
        
        <div class="content">
            <h1>IV MONITORING</h1>
            
            <div id="mainDisplay">
                <p class="volume-display"><span id="vol">--</span> mL</p>
                <div class="percentage"><span id="pct">0</span>%</div>
            </div>

            <div id="offlineMsg" style="display: none;">
                <p style="font-size: 1.2rem; color: var(--danger);">MACHINE IS OFF</p>
                <p style="font-size: 0.9rem; opacity: 0.6; margin-top: 10px;">Check Power & Connection</p>
            </div>

            <p class="timestamp">Last Updated: <span id="time">Never</span></p>
        </div>
    </div>
</div>

<script>
    // --- 1. CONFIGURATION ---
    const SUPABASE_URL = "https://lufbyxzzajanmoimrhmj.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx1ZmJ5eHp6YWphbm1vaW1yaG1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTQ0MDQsImV4cCI6MjA5MDQzMDQwNH0.V4WvphqA_2sEHOMkY8nf_a8cmNIRhaBS7td995A_pl8"; // Your Anon Key
    
    const supabase = typeof supabase !== 'undefined' ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : window['@supabase/supabase-js'].createClient(SUPABASE_URL, SUPABASE_KEY);

    async function fetchData() {
        // Fetch the very last row from the database
        const { data, error } = await supabase
            .from('iv_monitoring')
            .select('*')
            .order('created_at', { ascending: false })
            .limit(1);

        if (error) {
            console.error("Fetch Error:", error);
            return;
        }

        if (data && data.length > 0) {
            const latest = data[0];
            const updatedTime = new Date(latest.created_at);
            const now = new Date();
            
            // Difference in seconds
            const diff = (now - updatedTime) / 1000;

            // If no update for 30 seconds, consider machine OFF
            if (diff > 30) {
                setUIOffline();
            } else {
                setUIOnline(latest, updatedTime);
            }
        }
    }

    function setUIOnline(data, time) {
        document.getElementById('statusTag').innerText = "LIVE DATA";
        document.getElementById('statusTag').className = "status-badge status-online";
        document.getElementById('mainDisplay').style.display = "block";
        document.getElementById('offlineMsg').style.display = "none";
        
        document.getElementById('vol').innerText = data.volume;
        document.getElementById('pct').innerText = data.percentage;
        document.getElementById('liquidWave').style.height = data.percentage + "%";
        document.getElementById('time').innerText = time.toLocaleTimeString();

        // Change color to red if low
        if(data.percentage <= 20) {
            document.querySelector('.percentage').style.color = "var(--danger)";
        } else {
            document.querySelector('.percentage').style.color = "var(--primary)";
        }
    }

    function setUIOffline() {
        document.getElementById('statusTag').innerText = "OFFLINE";
        document.getElementById('statusTag').className = "status-badge status-offline";
        document.getElementById('mainDisplay').style.display = "none";
        document.getElementById('offlineMsg').style.display = "block";
        document.getElementById('liquidWave').style.height = "0%";
    }

    // Refresh data every 5 seconds
    setInterval(fetchData, 5000);
    fetchData(); // Initial call
</script>

</body>
</html>
